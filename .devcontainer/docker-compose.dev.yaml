# Development docker compose aligned with production settings
# docker compose -p dev-api-security-ait-dtu-dk -f ./my-development-docker-compose.yaml up -d

services:
  web:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    image: dtuait/api-security-ait-dtu-dk-app-main:dev-latest
    command: sleep infinity
    env_file:
      - ../backend/.env
    restart: always
    tty: true
    working_dir: /workspace/backend
    environment:
      DEVCONTAINER_DEFAULT_CWD: /workspace
      DEVCONTAINER_SYNC_UID_GID: "1"
      DEVCONTAINER_WORKSPACE_DIR: /workspace
      DJANGO_STATIC_ROOT: /data/static
      DJANGO_MEDIA_ROOT: /data/media
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_WAIT_FOR_DB: "false"
      DJANGO_MIGRATE: "false"
      DJANGO_COLLECTSTATIC: "false"
      APP_ENV_FILE: /workspace/backend/.env
    volumes:
      - ../:/workspace
      - static_data:/data/static
      - media_data:/data/media
    ports:
      - "80:80"
    networks:
      - internal
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal
networks:
  internal:
    driver: bridge
volumes:
  postgres_data:
  static_data:
    driver: local
  media_data:
    driver: local

